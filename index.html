
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Unbounded:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f13;
      --surface:   #13161d;
      --surface2:  #1a1e28;
      --surface3:  #222737;
      --border:    rgba(255,255,255,0.07);
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #ef4444;
      --success:   #22c55e;
      --sidebar-w: 260px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow: hidden; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; display: flex; height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 18px;
      overflow: hidden;
    }
    .sidebar-header { display: flex; flex-direction: column; gap: 4px; }
    .greeting { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
    .current-chat-label { font-size: 10px; color: var(--muted); line-height: 1.5; }
    .current-chat-label span { color: var(--text); font-weight: 600; }
    .divider { height: 1px; background: var(--border); }

    .nav-menu { display: flex; flex-direction: column; gap: 4px; }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; color: var(--muted);
      padding: 7px 10px; border-radius: 8px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      text-align: left; transition: background 0.15s, color 0.15s; width: 100%;
    }
    .nav-btn:hover { background: var(--surface3); color: var(--text); }
    .nav-btn.danger:hover { background: rgba(239,68,68,0.12); color: var(--danger); }
    .nav-btn .icon { font-size: 13px; }

    .chat-list-header {
      font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 0 4px;
    }
    .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; padding-right: 2px; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    .chat-item {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      color: var(--muted); font-size: 11px;
      border: 1px solid transparent; transition: all 0.15s;
    }
    .chat-item:hover { background: var(--surface2); color: var(--text); }
    .chat-item.active { background: var(--surface2); border-color: var(--accent); color: var(--text); }

.chat-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-delete-btn {
      flex-shrink: 0; width: 18px; height: 18px;
      border-radius: 4px; border: none; background: none;
      color: var(--muted); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s, background 0.15s, color 0.15s;
    }
    .chat-item:hover .chat-delete-btn { opacity: 1; }
    .chat-delete-btn:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

    /* CONFIRM OVERLAY */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .confirm-overlay.visible { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 28px;
      display: flex; flex-direction: column; gap: 16px; min-width: 280px;
      transform: translateY(8px); transition: transform 0.2s;
    }
    .confirm-overlay.visible .confirm-box { transform: translateY(0); }
    .confirm-title { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); }
    .confirm-sub { font-size: 11px; color: var(--muted); }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .confirm-cancel {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .confirm-cancel:hover { color: var(--text); background: var(--surface3); }
    .confirm-delete {
      padding: 7px 14px; border-radius: 8px; border: none;
      background: var(--danger); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .confirm-delete:hover { opacity: 0.85; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    .topbar {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 600;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .fill-buttons { display: flex; gap: 8px; }
    .fill-btn {
      padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
    }
    .fill-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.1); color: var(--accent); }

    .chat-window {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    .message { display: flex; flex-direction: column; max-width: 72%; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

.msg-bubble { padding: 10px 14px; border-radius: 14px; line-height: 1.6; font-size: 13px; }
    .message.user .msg-bubble {
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      border-bottom-right-radius: 4px; color: #dbeafe;
    }
    .message.bot .msg-bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 9px; color: var(--muted); margin-top: 3px; padding: 0 4px; }

    .typing-indicator {
      display: none; align-self: flex-start;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px; padding: 12px 16px;
    }
    .typing-indicator.visible { display: flex; gap: 5px; align-items: center; }
    .typing-dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

    /* INPUT AREA */
    .input-area {
      padding: 14px 24px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    .msg-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .msg-input::placeholder { color: var(--muted); }
    .msg-input:focus { border-color: var(--accent); }

    .action-btn {
      padding: 9px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .action-btn:hover { background: var(--surface3); color: var(--text); }

    .send-btn {
      padding: 9px 18px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.03em; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    }
    .send-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }

    .status-bar {
      padding: 6px 24px; font-size: 10px; color: var(--muted);
      background: var(--bg); border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="greeting">👋 Привет, user!</div>
      <div class="current-chat-label">
        Текущий чат:<br>
        <span id="currentChatLabel">Новый чат: 2025.05.22</span>
      </div>
    </div>

    <div class="divider"></div>

    <nav class="nav-menu">
      <button class="nav-btn"><span class="icon">📋</span> Протокол</button>
      <button class="nav-btn"><span class="icon">🧪</span> Протокол_тест</button>
      <button class="nav-btn danger"><span class="icon">🚪</span> Выйти</button>
    </nav>

    <div class="divider"></div>

    <div class="chat-list-header">Чаты</div>
    <div class="chat-list" id="chatList"></div>
  </div>

Darrel, [30.03.2026 21:18]
<!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Добро пожаловать!</div>
      <div class="fill-buttons">
        <button class="fill-btn" id="fullFill">Полное заполнение</button>
        <button class="fill-btn" id="fastFill">Быстрое заполнение</button>
      </div>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-area">
      <input class="msg-input" id="messageInput" type="text" placeholder="Введите сообщение...">
      <button class="send-btn" id="sendBtn">Отправить ↑</button>
      <button class="action-btn" id="uploadBtn">📎 Загрузить файл</button>
      <button class="action-btn" id="downloadBtn">⬇ Скачать</button>
      <button class="action-btn" id="newChatBtn">＋ Новый чат</button>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      онлайн
    </div>
  </div>
</div>

<!-- CONFIRM OVERLAY -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Удалить чат?</div>
    <div class="confirm-sub">Чат «<span id="confirmChatName"></span>» будет удалён без возможности восстановления.</div>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirmCancelBtn">Отмена</button>
      <button class="confirm-delete" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<script>
let chats = [
  { id: 'chat_1', name: '20250516_083700', messages: [] },
  {
    id: 'chat_2',
    name: 'Новый чат: 2025.05.22',
    messages: [
      { role: 'user', text: 'Привет', time: '10:41' },
      { role: 'bot',  text: 'Привет! Как я могу помочь тебе сегодня?', time: '10:41' },
      { role: 'user', text: 'Как дела?', time: '10:42' },
      { role: 'bot',  text: 'Всё отлично, готов помогать! Что нужно сделать?', time: '10:42' },
    ]
  },
  ...Array.from({ length: 10 }, (_, i) => ({
    id: `chat_${i + 3}`,
    name: `Новый чат: 2025.05.${i < 7 ? '22' : '23'}`,
    messages: []
  }))
];

let activeChatId = 'chat_2';
let pendingDeleteId = null;

// DOM refs
const chatListEl     = document.getElementById('chatList');
const chatWindowEl   = document.getElementById('chatWindow');
const typingEl       = document.getElementById('typingIndicator');
const currentLabelEl = document.getElementById('currentChatLabel');
const messageInputEl = document.getElementById('messageInput');
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmNameEl  = document.getElementById('confirmChatName');

function now() {
  return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}
function getChat(id) { return chats.find(c => c.id === id); }

// Render chat list
function renderChatList() {
  chatListEl.innerHTML = '';
  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');

    const name = document.createElement('span');
    name.className = 'chat-item-name';
    name.textContent = chat.name;

    const delBtn = document.createElement('button');
    delBtn.className = 'chat-delete-btn';
    delBtn.title = 'Удалить чат';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => { e.stopPropagation(); openConfirm(chat.id, chat.name); });

    item.appendChild(name);
    item.appendChild(delBtn);
    item.addEventListener('click', () => switchChat(chat.id));
    chatListEl.appendChild(item);
  });
}

// Render messages
function renderMessages() {
  [...chatWindowEl.children].forEach(ch => { if (ch.id !== 'typingIndicator') ch.remove(); });
  const chat = getChat(activeChatId);
  if (!chat) return;
  chat.messages.forEach(msg => {
    chatWindowEl.insertBefore(buildMessageEl(msg.text, msg.role, msg.time), typingEl);
  });
  chatWindowEl.scrollTop = chatWindowEl.scrollHeight;
}

function buildMessageEl(text, role, time) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  const t = document.createElement('div');
  t.className = 'msg-time';
  t.textContent = time || now();
  wrap.appendChild(bubble);
  wrap.appendChild(t);
  return wrap;
}

function switchChat(id) {
  activeChatId = id;
  const chat = getChat(id);
  currentLabelEl.textContent = chat ? chat.name : '—';
  renderChatList();
  renderMessages();
}

function addMessage(text, role) {
  const chat = getChat(activeChatId);
  if (!chat) return;
  const msg = { role, text, time: now() };
  chat.messages.push(msg);
  chatWindowEl.insertBefore(buildMessageEl(msg.text, msg.role, msg.time), typingEl);
  chatWindowEl.scrollTop = chatWindowEl.scrollHeight;
}

function sendMessage() {
  const text = messageInputEl.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  messageInputEl.value = '';
  typingEl.classList.add('visible');
  chatWindowEl.scrollTop = chatWindowEl.scrollHeight;
  setTimeout(() => {
    typingEl.classList.remove('visible');
    addMessage('Привет! Как я могу помочь тебе сегодня?', 'bot');
  }, 1200);
}

function createNewChat() {
  const d = new Date();
  const date = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const id = `chat_${Date.now()}`;
  chats.unshift({ id, name: `Новый чат: ${date}`, messages: [] });
  switchChat(id);
}

function openConfirm(id, name) {
  pendingDeleteId = id;
  confirmNameEl.textContent = name;
  confirmOverlay.classList.add('visible');
}
function closeConfirm() {
  confirmOverlay.classList.remove('visible');
  pendingDeleteId = null;
}
function confirmDelete() {
  if (!pendingDeleteId) return;
  chats = chats.filter(c => c.id !== pendingDeleteId);
  if (activeChatId === pendingDeleteId) activeChatId = chats.length ? chats[0].id : null;
  closeConfirm();
  if (activeChatId) { switchChat(activeChatId); }
  else { currentLabelEl.textContent = '—'; renderChatList(); renderMessages(); }
}

function downloadHistory() {
  const chat = getChat(activeChatId);
  if (!chat || !chat.messages.length) return;
  const text = chat.messages
    .map(m => `[${m.time}] ${m.role === 'user' ? 'Пользователь' : 'Бот'}: ${m.text}`)
    .join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = `${chat.name}.txt`;
  a.click();
}

// Upload + transcribe audio via local Whisper server
async function uploadFile() {
  const fi = document.createElement('input');
  fi.type = 'file';
  fi.accept = 'audio/*';
  fi.click();

  fi.onchange = async () => {
    const file = fi.files[0];
    if (!file) return;

    addMessage(`🎵 Аудио: ${file.name}`, 'user');
    typingEl.classList.add('visible');
    chatWindowEl.scrollTop = chatWindowEl.scrollHeight;

    try {
      const formData = new FormData();
      formData.append('file', file);

      const response = await fetch('http://localhost:5000/api/transcribe', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      typingEl.classList.remove('visible');

      if (data.text) {
        addMessage(data.text, 'bot');
      } else {
        addMessage('Ошибка: ' + (data.error || 'не удалось распознать аудио'), 'bot');
      }
    } catch (err) {
      typingEl.classList.remove('visible');
      addMessage(`Ошибка: сервер не запущен. Запусти python server.py`, 'bot');
    }
  };
}

// Events
document.getElementById('sendBtn').addEventListener('click', sendMessage);
messageInputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

document.getElementById('newChatBtn').addEventListener('click', createNewChat);
document.getElementById('downloadBtn').addEventListener('click', downloadHistory);
document.getElementById('uploadBtn').addEventListener('click', uploadFile);
document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirm);
document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirm(); });

// Init
renderChatList();
renderMessages();
currentLabelEl.textContent = getChat(activeChatId)?.name || '—';
</script>
</body>
</html>
