<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Chat App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Unbounded:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f13; --surface: #13161d; --surface2: #1a1e28; --surface3: #222737;
      --border: rgba(255,255,255,0.07); --accent: #3b82f6; --accent2: #6366f1;
      --text: #e2e8f0; --muted: #64748b; --danger: #ef4444; --success: #22c55e;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Лёгкий фон — только статичные градиенты, без SVG-фильтров */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(59,130,246,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 40px 36px; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.4s ease;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .logo {
      font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 600;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; gap: 2px; }
    .tab-btn {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      background: none; color: var(--muted);
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--surface3); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .form-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; width: 100%;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .submit-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s; margin-top: 4px;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .msg { font-size: 11px; padding: 10px 12px; border-radius: 8px; display: none; }
    .msg.error   { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
    .msg.success { display: block; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div>
    <div class="logo">Chat App</div>
    <div class="subtitle" id="cardSubtitle">Войдите, чтобы продолжить</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="login">Вход</button>
    <button class="tab-btn" data-tab="register">Регистрация</button>
  </div>

  <!-- LOGIN -->
  <div id="tab-login" class="form">
    <div id="loginMsg" class="msg"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="submit-btn" id="loginBtn">Войти</button>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" class="form" style="display:none;">
    <div id="registerMsg" class="msg"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" id="regPassword" type="password" placeholder="Минимум 6 символов" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">Повторите пароль</label>
      <input class="form-input" id="regPassword2" type="password" placeholder="Ещё раз" autocomplete="new-password">
    </div>
    <button class="submit-btn" id="registerBtn">Создать аккаунт</button>
  </div>
</div>

<script>
const API = 'http://localhost:5000';

(async function checkExistingAuth() {
  const token = localStorage.getItem('access_token');
  if (!token) return;
  try {
    const res = await fetch(API + '/api/chats', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) {
      window.location.replace('index.html');
    } else {
      localStorage.clear();
    }
  } catch {}
})();

const subtitles = {
  'login':    'Войдите, чтобы продолжить',
  'register': 'Создайте новый аккаунт'
};

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.form').forEach(f => f.style.display = 'none');
    document.getElementById('tab-' + btn.dataset.tab).style.display = 'flex';
    document.getElementById('cardSubtitle').textContent = subtitles[btn.dataset.tab] || '';
    clearMessages();
  });
});

function clearMessages() {
  document.querySelectorAll('.msg').forEach(m => { m.className = 'msg'; m.textContent = ''; });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'msg ' + (type || 'error');
  el.textContent = text;
}

function setLoading(btn, loading, origText) {
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Подождите...';
  } else {
    btn.disabled = false;
    btn.textContent = origText;
  }
}

document.getElementById('loginBtn').addEventListener('click', async function() {
  const btn      = this;
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showMsg('loginMsg', 'Заполните все поля'); return; }
  setLoading(btn, true, 'Войти');
  clearMessages();
  try {
    const res = await fetch(API + '/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg('loginMsg', data.error || 'Ошибка входа'); return; }
    localStorage.setItem('access_token',  data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    localStorage.setItem('user_email',    data.email);
    window.location.replace('index.html');
  } catch (e) {
    showMsg('loginMsg', 'Сервер недоступен: ' + e.message);
  } finally {
    setLoading(btn, false, 'Войти');
  }
});

document.getElementById('registerBtn').addEventListener('click', async function() {
  const btn       = this;
  const email     = document.getElementById('regEmail').value.trim();
  const password  = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;
  if (!email || !password || !password2) { showMsg('registerMsg', 'Заполните все поля'); return; }
  if (password !== password2)            { showMsg('registerMsg', 'Пароли не совпадают'); return; }
  if (password.length < 6)              { showMsg('registerMsg', 'Пароль минимум 6 символов'); return; }
  setLoading(btn, true, 'Создать аккаунт');
  clearMessages();
  try {
    const res = await fetch(API + '/api/auth/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg('registerMsg', data.error || 'Ошибка регистрации'); return; }
    localStorage.setItem('access_token',  data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    localStorage.setItem('user_email',    data.email);
    showMsg('registerMsg', 'Аккаунт создан! Перенаправление...', 'success');
    setTimeout(() => window.location.replace('index.html'), 800);
  } catch (e) {
    showMsg('registerMsg', 'Сервер недоступен: ' + e.message);
  } finally {
    setLoading(btn, false, 'Создать аккаунт');
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.tab-btn.active').dataset.tab;
  if (active === 'login')    document.getElementById('loginBtn').click();
  if (active === 'register') document.getElementById('registerBtn').click();
});
</script>
</body>
</html>
